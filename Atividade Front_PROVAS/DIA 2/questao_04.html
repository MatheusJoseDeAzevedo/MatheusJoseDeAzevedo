<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Jogador da Copa do Mundo </title>
    <link href="css/bootstrap.css" rel="stylesheet">
    <style> 
        * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        }

        body {
        min-height: 100vh;
        font-family: 'Segoe UI', Roboto, Arial, sans-serif;
        background-image: url('img/FIFA-World-Cup-26.jpg');
        display: flex;
        align-items: center;
        justify-content: center;
        }

        .container,
        .container-fluid {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        }

        .card {
        width: 100%;
        max-width: 380px;
        background-color: #ffffff;
        border-radius: 14px;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.18);
        overflow: hidden;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
        transform: translateY(-4px);
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.25);
        }

        .card-img-top {
        height: 230px;
        object-fit: cover;
        background-color: #e5e7eb;
        }

        .card-body {
        padding: 22px;
        }

        .card-title {
        font-size: 1.2rem;
        font-weight: 600;
        color: #1e3a8a;
        display: flex;
        justify-content: space-between;
        align-items: center;
        }
        
        .card-text {
        margin-top: 12px;
        font-size: 0.95rem;
        color: #374151;
        line-height: 1.6;
        }

        #Rank {
        background-color: #2563eb;
        color: #ffffff;
        font-size: 0.75rem;
        padding: 5px 12px;
        border-radius: 12px;
        font-weight: 600;
        }

        .btn-primary {
        width: 100%;
        margin-top: 18px;
        background-color: #2563eb;
        color: #ffffff;
        border: none;
        border-radius: 24px;
        padding: 12px;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition: background-color 0.2s ease, transform 0.2s ease;
        }

        .btn-primary:hover {
        background-color: #1e40af;
        transform: scale(1.03);
        }
    
        .placeholder {
        border-radius: 6px;
        }

        @media (max-width: 420px) {
            .card {
            max-width: 90%;
            }
        }
    </style>
</head>
<body>
    <div class="bg-copa">
        <div  class="d-flex flex-collum justify-content-center">
            <div id="Cards" class="d-flex flex-row align-items-center">
                <div class="card" style="width: 22rem;" aria-hidden="true">
                    <img src="img/_vinicius_junior.png" class="card-img-top" alt="Placeholder Copa">

                    <div class="card-body">
                        <h5 id="Nome" class="card-title">
                            <span class="card-title">Vini JR.</span>
                            <span id="Rank" class="badge text-bg-secondary">9,5</span>
                        </h5>
                        <p class="card-text">
                            <span id="Data_Nas"><strong>Nascimento:</strong> 12/07/2000 </span><br>
                            <span id="Alutra"><strong>Altura:</strong> 1,76 </span><br>
                            <span id="Posição "><strong>Posição:</strong> Ponta-esquerda / Atacante</span><br>
                        </p>
                    </div>
                </div>
            </div>
        </div>
        <a href="#" onclick="add()" tabindex="-1" class="btn btn-primary" style="margin: 10px; padding: 10px;">Adcionar Novo Jogador</a>
    </div>
    </div>
    <script src="js\bootstrap.js"></script>
    <script src="script.js"></script>
</body>
</html>
