<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Infinity Bank - Convidados VIP</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .card {
      background: #ffffff;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
    }

    .cabecalho {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .cabecalho small {
      font-size: 12px;
      color: #888;
    }

    .cabecalho h1 {
      font-size: 22px;
      font-weight: 600;
      color: #1a1a1a;
      margin-top: 4px;
    }

    .adicionar {
      display: flex;
      gap: 8px;
      margin-bottom: 1.25rem;
    }

    .adicionar input {
      flex: 1;
      padding: 10px 14px;
      font-size: 15px;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s;
    }

    .adicionar input:focus {
      border-color: #4a90e2;
    }

    .adicionar button {
      padding: 10px 18px;
      font-size: 15px;
      font-weight: 600;
      background-color: #4a90e2;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s;
      white-space: nowrap;
    }

    .adicionar button:hover {
      background-color: #357abd;
    }

    .adicionar button:active {
      background-color: #2a6099;
    }

    .contador {
      font-size: 12px;
      color: #888;
      margin-bottom: 0.75rem;
    }

    #lista {
      list-style: none;
    }

    #lista li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #f0f0f0;
      gap: 8px;
    }

    #lista li:last-child {
      border-bottom: none;
    }

    .nome {
      flex: 1;
      font-size: 15px;
      color: #1a1a1a;
      transition: all 0.2s;
    }

    .nome.riscado {
      text-decoration: line-through;
      color: #aaa;
    }

    .acoes {
      display: flex;
      gap: 6px;
    }

    .acoes button {
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .acoes button:hover {
      opacity: 0.8;
    }

    .btn-concluir {
      background-color: #e6f4ea;
      color: #2e7d32;
    }

    .btn-editar {
      background-color: #e8f0fe;
      color: #1a4f9c;
    }

    .btn-excluir {
      background-color: #fdecea;
      color: #c62828;
    }

    .vazio {
      text-align: center;
      color: #bbb;
      font-size: 14px;
      padding: 1.5rem 0;
    }
  </style>
</head>
<body>

  <div class="card">

    <div class="cabecalho">
      <small>Laboratório FrontEnd · Exercício 05</small>
      <h1> Lista de Convidados VIP</h1>
    </div>

    <div class="adicionar">
      <input type="text" id="input-nome" placeholder="Nome do convidado" maxlength="60" />
      <button id="btn-adicionar">Adicionar</button>
    </div>

    <p class="contador" id="contador">0 convidados</p>

    <ul id="lista">
      <li class="vazio" id="vazio">Nenhum convidado adicionado.</li>
    </ul>

  </div>

  <script>
    const inputNome    = document.getElementById('input-nome');
    const btnAdicionar = document.getElementById('btn-adicionar');
    const lista        = document.getElementById('lista');
    const contador     = document.getElementById('contador');
    const itemVazio    = document.getElementById('vazio');

    function atualizarContador() {
      const total = lista.querySelectorAll('li:not(.vazio)').length;
      contador.textContent = total === 1 ? '1 convidado' : `${total} convidados`;
      itemVazio.style.display = total === 0 ? 'block' : 'none';
    }

    function criarItem(nome) {
      const li = document.createElement('li');

      const spanNome = document.createElement('span');
      spanNome.classList.add('nome');
      spanNome.textContent = nome;

      const divAcoes = document.createElement('div');
      divAcoes.classList.add('acoes');

      const btnConcluir = document.createElement('button');
      btnConcluir.classList.add('btn-concluir');
      btnConcluir.textContent = 'Concluir';
      btnConcluir.addEventListener('click', function () {
        spanNome.classList.toggle('riscado');
        btnConcluir.textContent = spanNome.classList.contains('riscado') ? 'Desfazer' : 'Concluir';
      });

      const btnEditar = document.createElement('button');
      btnEditar.classList.add('btn-editar');
      btnEditar.textContent = 'Editar';
      btnEditar.addEventListener('click', function () {
        const novoNome = prompt('Editar nome do convidado:', spanNome.textContent);
        if (novoNome !== null && novoNome.trim() !== '') {
          spanNome.textContent = novoNome.trim();
        }
      });

      const btnExcluir = document.createElement('button');
      btnExcluir.classList.add('btn-excluir');
      btnExcluir.textContent = 'Excluir';
      btnExcluir.addEventListener('click', function () {
        li.remove();
        atualizarContador();
      });

      divAcoes.appendChild(btnConcluir);
      divAcoes.appendChild(btnEditar);
      divAcoes.appendChild(btnExcluir);

      li.appendChild(spanNome);
      li.appendChild(divAcoes);

      return li;
    }

    function adicionar() {
      const nome = inputNome.value.trim();
      if (nome === '') return;

      const li = criarItem(nome);
      lista.appendChild(li);
      inputNome.value = '';
      inputNome.focus();
      atualizarContador();
    }

    btnAdicionar.addEventListener('click', adicionar);

    inputNome.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') adicionar();
    });

    atualizarContador();
  </script>

</body>
</html>
