<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Validador de CPF</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex justify-content-center align-items-center vh-100">

  <div class="card shadow p-4 text-center" style="width: 350px;">
    <h3 class="mb-3">Validador de CPF</h3>

    <input type="text" id="cpf" class="form-control mb-3" placeholder="Digite o CPF (somente números)">

    <button class="btn btn-primary w-100" onclick="validarCPF()">
      Validar
    </button>

    <div id="resultado" class="mt-3 fw-bold"></div>
  </div>

  <script>
    function validarCPF() {
      let cpf = document.getElementById("cpf").value.replace(/[^\d]+/g, '');
      let resultado = document.getElementById("resultado");

      if (cpf.length !== 11 || /^(\d)\1+$/.test(cpf)) {
        mostrarResultado(false);
        return;
      }
      let soma = 0;
      for (let i = 0; i < 9; i++) {
        soma += parseInt(cpf.charAt(i)) * (10 - i);
      }
      let resto = (soma * 10) % 11;
      if (resto === 10) resto = 0;

      if (resto !== parseInt(cpf.charAt(9))) {
        mostrarResultado(false);
        return;
      } 	
      soma = 0;
      for (let i = 0; i < 10; i++) {
        soma += parseInt(cpf.charAt(i)) * (11 - i);
      }
      resto = (soma * 10) % 11;
      if (resto === 10) resto = 0;

      if (resto !== parseInt(cpf.charAt(10))) {
        mostrarResultado(false);
        return;
      }
      mostrarResultado(true);
    }

    function mostrarResultado(valido) {
      let resultado = document.getElementById("resultado");

      if (valido) {
        resultado.textContent = "CPF Válido ✅";
        resultado.className = "mt-3 fw-bold text-success";
      } else {
        resultado.textContent = "CPF Inválido ❌";
        resultado.className = "mt-3 fw-bold text-danger";
      }
    }
  </script>
</body>
</html>
