<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Infinity Bank - Simulador</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex justify-content-center align-items-center vh-100">

  <div class="card shadow p-4" style="width: 350px;">
    <h3 class="text-center mb-3">Simulador Infinity Bank</h3>

    <div class="mb-2">
      <label class="form-label fw-bold">Bandeira:</label>
      <select id="bandeira" class="form-select">
        <option value="visa">Visa</option>
        <option value="master">Master</option>
        <option value="elo">Elo</option>
      </select>
    </div>

    <div class="mb-2">
      <label class="form-label fw-bold">Valor da Venda (R$):</label>
      <input type="number" id="valor" step="0.01" class="form-control">
    </div>

    <div class="mb-3">
      <label class="form-label fw-bold">Parcelas:</label>
      <input type="number" id="parcelas" min="1" class="form-control">
    </div>

    <button id="calcular" class="btn btn-primary w-100">
      Calcular
    </button>

    <div id="resultado" class="mt-3 small fw-bold"></div>
  </div>

  <script>
    document.getElementById("calcular").addEventListener("click", function () {

  const bandeira = document.getElementById("bandeira").value;
  const valor = Number(document.getElementById("valor").value);
  const parcelas = Number(document.getElementById("parcelas").value);
  const resultado = document.getElementById("resultado");

  if (!valor || !parcelas) {
    resultado.innerHTML = "Preencha todos os campos!";
    return;
  }

  let taxaPercentual;

  switch (bandeira) {
    case "visa":
      taxaPercentual = 0.02; 
      break;

    case "master":
      taxaPercentual = 0.0185;
      break;

    case "elo":
      taxaPercentual = 0.03;
      break;

    default:
      taxaPercentual = 0;
  }

  const taxaBandeira = valor * taxaPercentual;
  const juros = valor * (0.015 * parcelas);
  const total = valor + taxaBandeira + juros;
  const valorParcela = 12.50 +(total / parcelas);

  resultado.innerHTML = `
    Taxa da Bandeira: R$ ${taxaBandeira.toFixed(2)}<br>
    Juros Totais: R$ ${juros.toFixed(2)}<br>
    Taxa Mensal: R$ ${valorParcela.toFixed(2)}<br>
  `;
});
  </script>

</body>
</html>
