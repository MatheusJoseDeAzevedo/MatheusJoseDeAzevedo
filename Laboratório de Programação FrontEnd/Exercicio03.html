<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Média Escolar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex justify-content-center align-items-center vh-100">

  <div class="card shadow p-4 text-center" style="width: 350px;">
    <h3 class="mb-3">Média Escolar</h3>

    <input type="text" id="nome" class="form-control mb-2" placeholder="Nome do aluno">

    <input type="number" id="nota1" class="form-control mb-2" placeholder="Nota 1" step="0.1">

    <input type="number" id="nota2" class="form-control mb-2" placeholder="Nota 2" step="0.1">

    <input type="number" id="nota3" class="form-control mb-3" placeholder="Nota 3" step="0.1">

    <button id="calcular" class="btn btn-primary w-100">
      Calcular
    </button>

    <div id="resultado" class="mt-3 fw-bold"></div>
  </div>

  <script>
    document.getElementById("calcular").addEventListener("click", function() {
      const nome = document.getElementById("nome").value;
      const nota1 = Number(document.getElementById("nota1").value);
      const nota2 = Number(document.getElementById("nota2").value);
      const nota3 = Number(document.getElementById("nota3").value);
      const resultado = document.getElementById("resultado");

      if (!nome || isNaN(nota1) || isNaN(nota2) || isNaN(nota3)) {
        resultado.textContent = "Preencha todos os campos!";
        resultado.className = "mt-3 fw-bold text-danger";
        return;
      }

      const media = (nota1 + nota2 + nota3) / 3;
      let mensagem = `${nome}, sua média é ${media.toFixed(2)} - `;

      if (media >= 7) {
        mensagem += "Aprovado ✅";
        resultado.className = "mt-3 fw-bold text-primary";
      } 
      else if (media >= 4) {
        let falta = 10 - media;
        mensagem += `Exame ⚠️ (faltam ${falta.toFixed(2)} pontos para chegar a 10)`;
        resultado.className = "mt-3 fw-bold text-warning";
      } 
      else {
        mensagem += "Reprovado ❌";
        resultado.className = "mt-3 fw-bold text-danger";
      }

      resultado.textContent = mensagem;
    });
  </script>

</body>
</html>
